version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: Cap_DB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    env_file:
      - .env
    command: ["python", "-m", "app.main", "backfill"]

volumes:
  pg_data:
